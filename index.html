<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>은디의 공부 다이어리</title>
  <style>
    :root {
      --sky-1: #eaf8ff;
      --sky-2: #cceeff;
      --sky-3: #8bcbe8;
      --sky-4: #5aa6c7;
      --navy: #40536a;
      --text: #46515f;
      --muted: #85929e;
      --line: #c9d8df;
      --panel: #ffffff;
      --panel-blue: #f2fbff;
      --lime: #efff72;
      --lime-deep: #d4ee40;
      --pink: #ffcfe3;
      --yellow: #fff6bf;
      --shadow: rgba(54, 78, 92, 0.18);
      --danger: #ef6d7f;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,.8), transparent 28%),
        repeating-linear-gradient(
          0deg,
          #dff4ff 0,
          #dff4ff 2px,
          #e9f9ff 2px,
          #e9f9ff 4px
        );
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family:
        "Malgun Gothic",
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        sans-serif;
      background:
        linear-gradient(rgba(255,255,255,.25), rgba(255,255,255,.25));
      font-size: 14px;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .window {
      width: min(980px, calc(100% - 24px));
      margin: 22px auto 50px;
      border: 2px solid #90a9b7;
      border-radius: 10px;
      overflow: hidden;
      background: #f9fdff;
      box-shadow:
        0 0 0 2px #d9eaf1,
        0 8px 24px var(--shadow);
    }

    .titlebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 7px 10px;
      color: #41556b;
      font-weight: 700;
      background:
        linear-gradient(#f8fdff, #c9eafa);
      border-bottom: 1px solid #8eafbf;
      text-shadow: 0 1px 0 white;
    }

    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .mini-logo {
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border: 1px solid #7ea7ba;
      border-radius: 3px;
      background: white;
      font-size: 11px;
    }

    .title-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .window-buttons {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .window-dot {
      width: 18px;
      height: 16px;
      border: 1px solid #839ba8;
      border-radius: 3px;
      background: linear-gradient(#ffffff, #d9e7ed);
      color: #6b7b84;
      font-size: 10px;
      line-height: 12px;
      padding: 0;
    }

    .top-strip {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 8px 12px;
      background: white;
      border-bottom: 1px solid var(--line);
    }

    .song-strip {
      min-width: 0;
      color: #7b8790;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-strip strong {
      color: #f05275;
      margin-right: 6px;
    }

    .d-day {
      border: 1px solid #a6b8c0;
      border-radius: 4px;
      padding: 4px 8px;
      background: linear-gradient(#fff, #edf4f6);
      color: #55636d;
      font-size: 12px;
      font-weight: 700;
      box-shadow: inset 0 1px 0 white;
    }

    .main {
      padding: 12px;
      background:
        linear-gradient(to bottom, rgba(255,255,255,.5), rgba(230,246,253,.55));
    }

    .layout {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 10px;
    }

    .panel {
      border: 1px solid #9eb6c1;
      border-radius: 7px;
      background: var(--panel);
      box-shadow:
        inset 0 0 0 2px #e8f2f6,
        0 1px 2px rgba(50,70,80,.08);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 34px;
      padding: 6px 9px;
      background:
        linear-gradient(#fbfeff, #d8eef8);
      border-bottom: 1px solid #a9bec8;
      color: #496074;
      font-weight: 700;
      text-shadow: 0 1px 0 white;
    }

    .panel-header .caption {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .panel-body {
      padding: 10px;
    }

    .today-card {
      background:
        linear-gradient(135deg, #fff, #f3fbff);
    }

    .today-line {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 8px;
      align-items: start;
      padding: 7px 0;
      border-bottom: 1px dotted #c8d3d8;
    }

    .today-line:last-child {
      border-bottom: 0;
    }

    .label-chip {
      display: inline-block;
      width: fit-content;
      padding: 2px 7px;
      border: 1px solid #b2c4cb;
      border-radius: 4px;
      background: #f4fbff;
      color: #5e7380;
      font-size: 12px;
      font-weight: 700;
    }

    .pink {
      background: #fff0f6;
    }

    .yellow {
      background: #fffbea;
    }

    .lime {
      background: #f9ffd8;
    }

    .today-value {
      min-width: 0;
      color: #5b6570;
      line-height: 1.7;
      word-break: keep-all;
    }

    .today-value strong {
      color: #4f6576;
    }

    .goal-list,
    .progress-list,
    .record-list {
      display: grid;
      gap: 7px;
    }

    .goal-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 90px auto;
      gap: 6px;
      align-items: center;
      padding: 7px;
      border: 1px solid #d1dde3;
      border-radius: 5px;
      background:
        linear-gradient(#ffffff, #f6fbfd);
    }

    .goal-name {
      min-width: 0;
      color: #536571;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .goal-count {
      color: #6d7d86;
      text-align: right;
      font-size: 12px;
    }

    .btn {
      border: 1px solid #8eaab8;
      border-radius: 4px;
      padding: 6px 10px;
      color: #4b6272;
      background:
        linear-gradient(#ffffff, #dcecf3);
      box-shadow:
        inset 0 1px 0 white,
        0 1px 1px rgba(50,70,80,.08);
      font-weight: 700;
      line-height: 1.2;
    }

    .btn:hover {
      background:
        linear-gradient(#ffffff, #cfe8f3);
    }

    .btn.primary {
      border-color: #a4b841;
      color: #4a5a22;
      background:
        linear-gradient(#ffffdf, #e8f55b);
    }

    .btn.danger {
      border-color: #d76a78;
      color: white;
      background:
        linear-gradient(#ff9aaa, #eb6778);
    }

    .btn.small {
      padding: 4px 7px;
      font-size: 11px;
    }

    .form-grid {
      display: grid;
      gap: 8px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 8px;
      align-items: center;
    }

    .form-row label,
    .field-label {
      color: #66747d;
      font-size: 12px;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid #adbec6;
      border-radius: 4px;
      padding: 7px 8px;
      color: #4e5b64;
      background: white;
      outline: none;
      box-shadow: inset 1px 1px 2px rgba(60,80,90,.08);
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #a5bd37;
      box-shadow:
        inset 1px 1px 2px rgba(60,80,90,.08),
        0 0 0 2px rgba(225,244,86,.45);
    }

    textarea {
      min-height: 76px;
      resize: vertical;
    }

    .form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding-top: 3px;
    }

    .section-gap {
      margin-top: 10px;
    }

    .month-box {
      margin-top: 10px;
      border: 1px solid #94aeb9;
      border-radius: 7px;
      background: #fff;
      overflow: hidden;
      box-shadow: inset 0 0 0 2px #eaf4f7;
    }

    .month-title {
      display: grid;
      grid-template-columns: 34px 1fr 34px;
      align-items: center;
      gap: 6px;
      padding: 7px;
      background:
        linear-gradient(#fbfeff, #dbeef7);
      border-bottom: 1px solid #9db3bd;
    }

    .month-label {
      text-align: center;
      color: #4b6170;
      font-size: 16px;
      font-weight: 700;
      text-shadow: 0 1px 0 white;
    }

    .month-arrow {
      width: 28px;
      height: 24px;
      padding: 0;
      border: 1px solid #a5b7bf;
      border-radius: 4px;
      background: linear-gradient(#fff, #e6eff2);
      color: #60737c;
      font-weight: 700;
    }

    .calendar-wrap {
      padding: 7px;
      background:
        linear-gradient(#ffffff, #f8fbfc);
    }

    .calendar-head,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .calendar-head {
      border-top: 1px solid #c6d1d6;
      border-left: 1px solid #c6d1d6;
    }

    .weekday {
      padding: 5px 2px;
      border-right: 1px solid #c6d1d6;
      border-bottom: 1px solid #c6d1d6;
      text-align: center;
      color: #7c8992;
      background: #f8fbfc;
      font-size: 11px;
      font-weight: 700;
    }

    .weekday:first-child {
      color: #e76b7a;
    }

    .weekday:last-child {
      color: #5e84bf;
    }

    .calendar-grid {
      border-left: 1px solid #c6d1d6;
    }

    .day {
      min-height: 82px;
      border: 0;
      border-right: 1px solid #c6d1d6;
      border-bottom: 1px solid #c6d1d6;
      border-radius: 0;
      padding: 4px;
      text-align: left;
      background: white;
      color: #6b767e;
      overflow: hidden;
      position: relative;
    }

    .day:hover {
      background: #fbfff0;
    }

    .day.other {
      background: #f4f6f7;
      color: #b5bdc1;
    }

    .day.selected {
      background: #fbffd4;
      box-shadow: inset 0 0 0 2px #59636a;
      z-index: 1;
    }

    .day.today:not(.selected) {
      background: #f4ffe5;
      box-shadow: inset 0 0 0 2px #d6ed48;
    }

    .day-number {
      display: inline-grid;
      place-items: center;
      width: 23px;
      height: 20px;
      margin-bottom: 2px;
      color: inherit;
      font-size: 11px;
      font-weight: 700;
    }

    .day.selected .day-number {
      background: var(--lime);
      border: 1px solid #d1df44;
      color: #40515a;
    }

    .day-total {
      width: fit-content;
      max-width: 100%;
      margin: 1px 0 2px;
      padding: 1px 3px;
      border-radius: 2px;
      background: #efffd0;
      color: #617227;
      font-size: 9px;
      font-weight: 700;
      white-space: nowrap;
    }

    .day-record {
      display: block;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #6d7880;
      font-size: 9px;
      line-height: 1.35;
    }

    .progress-card {
      padding: 7px;
      border: 1px solid #d2dde2;
      background: #fbfdfe;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
    }

    .progress-name {
      color: #506573;
      font-weight: 700;
      font-size: 12px;
    }

    .progress-number {
      color: #84919a;
      font-size: 10px;
      text-align: right;
    }

    .progress-track {
      height: 13px;
      border: 1px solid #b8c6cc;
      border-radius: 2px;
      background:
        repeating-linear-gradient(
          90deg,
          #edf2f4 0,
          #edf2f4 11px,
          #dfe7ea 11px,
          #dfe7ea 12px
        );
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background:
        repeating-linear-gradient(
          90deg,
          #ecff70 0,
          #ecff70 11px,
          #d6ed3f 11px,
          #d6ed3f 12px
        );
      border-right: 1px solid #aabc35;
      transition: width .2s ease;
    }

    .overall-box {
      padding: 9px;
      border: 1px solid #d1dee3;
      background:
        linear-gradient(#fffef2, #fbffe1);
    }

    .overall-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }

    .overall-main strong {
      color: #536875;
    }

    .overall-rate {
      color: #687720;
      font-size: 22px;
      font-weight: 700;
    }

    .record-item {
      padding: 8px;
      border: 1px solid #d0dce1;
      border-radius: 4px;
      background: linear-gradient(#fff, #f9fcfd);
    }

    .record-item-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }

    .record-subject {
      min-width: 0;
      color: #506673;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .record-count {
      flex-shrink: 0;
      color: #7a8b2d;
      font-weight: 700;
      font-size: 12px;
    }

    .record-note {
      margin: 5px 0 0;
      color: #77838b;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 12px;
      line-height: 1.6;
    }

    .record-buttons {
      display: flex;
      gap: 5px;
      margin-top: 6px;
    }

    .selected-date {
      color: #647681;
      font-size: 12px;
      font-weight: 700;
    }

    .empty {
      padding: 14px 8px;
      text-align: center;
      color: #96a1a8;
      border: 1px dashed #cad5da;
      background: #fbfdfe;
      font-size: 12px;
    }

    .bottom-toolbar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 8px 10px;
      border-top: 1px solid #9eb5bf;
      background:
        linear-gradient(#eef8fc, #d3ebf5);
    }

    .statusbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 5px 10px;
      border-top: 1px solid #b2c5cd;
      color: #7b8992;
      background: #f6fbfd;
      font-size: 10px;
    }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(56, 70, 78, .42);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: min(420px, 100%);
      border: 2px solid #8ca8b4;
      border-radius: 8px;
      background: white;
      box-shadow:
        0 0 0 2px #d9e8ee,
        0 12px 32px rgba(35, 50, 60, .28);
      overflow: hidden;
    }

    .modal-title {
      padding: 7px 10px;
      border-bottom: 1px solid #9db3bd;
      background: linear-gradient(#fbfeff, #d8eef8);
      color: #526775;
      font-weight: 700;
    }

    .modal-body {
      padding: 12px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 10px;
    }

    .tiny-note {
      margin: 7px 0 0;
      color: #8b979e;
      font-size: 10px;
      line-height: 1.5;
    }

    @media (max-width: 760px) {
      .window {
        width: min(100% - 10px, 980px);
        margin-top: 5px;
        border-radius: 7px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .main {
        padding: 7px;
      }

      .form-row {
        grid-template-columns: 74px 1fr;
      }

      .day {
        min-height: 68px;
      }
    }

    @media (max-width: 520px) {
      body {
        font-size: 13px;
      }

      .top-strip {
        grid-template-columns: 1fr;
      }

      .d-day {
        width: fit-content;
      }

      .goal-row {
        grid-template-columns: minmax(0, 1fr) 72px;
      }

      .goal-row .edit-goal {
        grid-column: 1 / -1;
      }

      .day {
        min-height: 56px;
        padding: 2px;
      }

      .day-record {
        display: none;
      }

      .day-total {
        font-size: 8px;
      }

      .weekday {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <div class="titlebar-left">
        <div class="mini-logo">📘</div>
        <div class="title-text">은디의 공부 다이어리</div>
      </div>
      <div class="window-buttons" aria-hidden="true">
        <button class="window-dot" type="button">─</button>
        <button class="window-dot" type="button">□</button>
        <button class="window-dot" type="button">×</button>
      </div>
    </div>

    <div class="top-strip">
      <div class="song-strip">
        <strong>♬ TODAY'S BGM</strong>
        오늘도 조금씩 채우는 중 · 천천히 해도 괜찮아
      </div>
      <div class="d-day" id="ddayText">D-DAY 계산 중</div>
    </div>

    <main class="main">
      <div class="layout">
        <section>
          <div class="panel today-card">
            <div class="panel-header">
              <span class="caption">🌷 오늘의 공부 기록</span>
              <span id="todayDateText"></span>
            </div>
            <div class="panel-body">
              <div class="today-line">
                <span class="label-chip pink">오늘 푼 문제</span>
                <div class="today-value" id="todaySolvedText">아직 기록이 없어요.</div>
              </div>
              <div class="today-line">
                <span class="label-chip yellow">이번 달 목표</span>
                <div class="today-value" id="monthGoalText">목표를 설정해 주세요.</div>
              </div>
              <div class="today-line">
                <span class="label-chip lime">한 줄 메모</span>
                <div class="today-value" id="todayMemoText">오늘의 공부를 기록해 봐요.</div>
              </div>
            </div>
          </div>

          <div class="panel section-gap">
            <div class="panel-header">
              <span class="caption">📝 공부 기록 입력</span>
            </div>
            <div class="panel-body">
              <form id="recordForm" class="form-grid">
                <div class="form-row">
                  <label for="recordDate">날짜</label>
                  <input type="date" id="recordDate" required />
                </div>

                <div class="form-row">
                  <label for="recordSubject">과목</label>
                  <select id="recordSubject" required></select>
                </div>

                <div class="form-row">
                  <label for="recordCount">문제 수</label>
                  <input
                    type="number"
                    id="recordCount"
                    min="1"
                    step="1"
                    placeholder="예: 10"
                    required
                  />
                </div>

                <div class="form-row">
                  <label for="recordNote">메모</label>
                  <textarea
                    id="recordNote"
                    placeholder="예: 유형자산 1~10번 / 오답 3개"
                  ></textarea>
                </div>

                <div class="form-actions">
                  <button type="submit" class="btn primary" id="saveRecordButton">
                    기록 저장
                  </button>
                  <button
                    type="button"
                    class="btn"
                    id="cancelEditButton"
                    hidden
                  >
                    수정 취소
                  </button>
                </div>
              </form>
            </div>
          </div>

          <div class="panel section-gap">
            <div class="panel-header">
              <span class="caption">🎯 이번 달 목표 설정</span>
            </div>
            <div class="panel-body">
              <div class="goal-list" id="goalList"></div>

              <form id="goalForm" class="form-grid section-gap">
                <div class="form-row">
                  <label for="newSubjectName">과목 이름</label>
                  <input
                    type="text"
                    id="newSubjectName"
                    maxlength="30"
                    placeholder="예: 재무회계"
                    required
                  />
                </div>

                <div class="form-row">
                  <label for="newSubjectGoal">목표 문제</label>
                  <input
                    type="number"
                    id="newSubjectGoal"
                    min="1"
                    step="1"
                    placeholder="예: 100"
                    required
                  />
                </div>

                <div class="form-actions">
                  <button type="submit" class="btn">＋ 과목 추가</button>
                </div>
              </form>
            </div>
          </div>
        </section>

        <section>
          <div class="panel">
            <div class="panel-header">
              <span class="caption">📊 이번 달 진도율</span>
            </div>
            <div class="panel-body">
              <div class="overall-box">
                <div class="overall-main">
                  <div>
                    <strong>전체 진행률</strong>
                    <div id="overallText">0 / 0문제</div>
                  </div>
                  <div class="overall-rate" id="overallRate">0%</div>
                </div>
                <div class="progress-track">
                  <div class="progress-bar" id="overallBar" style="width:0%"></div>
                </div>
              </div>

              <div class="progress-list section-gap" id="subjectProgressList"></div>
            </div>
          </div>

          <div class="month-box">
            <div class="month-title">
              <button type="button" class="month-arrow" id="prevMonth">◀</button>
              <div class="month-label" id="monthLabel"></div>
              <button type="button" class="month-arrow" id="nextMonth">▶</button>
            </div>

            <div class="calendar-wrap">
              <div class="calendar-head">
                <div class="weekday">일</div>
                <div class="weekday">월</div>
                <div class="weekday">화</div>
                <div class="weekday">수</div>
                <div class="weekday">목</div>
                <div class="weekday">금</div>
                <div class="weekday">토</div>
              </div>
              <div class="calendar-grid" id="calendarGrid"></div>
            </div>
          </div>

          <div class="panel section-gap">
            <div class="panel-header">
              <span class="caption">📌 선택한 날짜의 기록</span>
              <span class="selected-date" id="selectedDateTitle"></span>
            </div>
            <div class="panel-body">
              <div class="record-list" id="selectedRecordList"></div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div class="bottom-toolbar">
      <button type="button" class="btn" id="todayButton">오늘 달력</button>
      <button type="button" class="btn" id="exportButton">백업 저장</button>
      <button type="button" class="btn" id="importButton">백업 불러오기</button>
      <button type="button" class="btn danger" id="resetButton">전체 삭제</button>
      <input type="file" id="importFile" accept=".json,application/json" hidden />
    </div>

    <div class="statusbar">
      <span>기록은 현재 브라우저에 저장됩니다.</span>
      <span id="recordCountStatus">0개의 기록</span>
    </div>
  </div>

  <div class="modal-backdrop" id="goalModal">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-title">목표 수정</div>
      <div class="modal-body">
        <form id="goalEditForm" class="form-grid">
          <input type="hidden" id="editGoalSubjectId" />

          <div class="form-row">
            <label for="editGoalName">과목 이름</label>
            <input type="text" id="editGoalName" maxlength="30" required />
          </div>

          <div class="form-row">
            <label for="editGoalCount">목표 문제</label>
            <input
              type="number"
              id="editGoalCount"
              min="1"
              step="1"
              required
            />
          </div>

          <div class="modal-actions">
            <button type="button" class="btn" id="closeGoalModal">취소</button>
            <button type="submit" class="btn primary">저장</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "studyTrackerData_v1";

      const pad = (number) => String(number).padStart(2, "0");

      const formatDateKey = (date) =>
        `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;

      const formatMonthKey = (date) =>
        `${date.getFullYear()}-${pad(date.getMonth() + 1)}`;

      const parseDateKey = (dateKey) => {
        const [year, month, day] = dateKey.split("-").map(Number);
        return new Date(year, month - 1, day);
      };

      const makeId = () =>
        `${Date.now()}-${Math.random().toString(36).slice(2, 9)}`;

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let viewDate = new Date(today.getFullYear(), today.getMonth(), 1);
      let selectedDateKey = formatDateKey(today);
      let editingRecordId = null;

      const initialMonthKey = formatMonthKey(today);

      const defaultData = {
        subjects: [
          { id: "subject-a", name: "A과목" },
          { id: "subject-b", name: "B과목" }
        ],
        monthlyGoals: {
          [initialMonthKey]: {
            "subject-a": 100,
            "subject-b": 200
          }
        },
        records: []
      };

      function cloneDefaultData() {
        return JSON.parse(JSON.stringify(defaultData));
      }

      function loadData() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (!saved) return cloneDefaultData();

          const parsed = JSON.parse(saved);
          if (
            !parsed ||
            !Array.isArray(parsed.subjects) ||
            !parsed.monthlyGoals ||
            !Array.isArray(parsed.records)
          ) {
            throw new Error("저장 데이터 형식이 올바르지 않습니다.");
          }
          return parsed;
        } catch (error) {
          console.error(error);
          alert("저장된 데이터를 읽지 못해 기본값으로 시작합니다.");
          return cloneDefaultData();
        }
      }

      let data = loadData();

      const elements = {
        monthLabel: document.getElementById("monthLabel"),
        prevMonth: document.getElementById("prevMonth"),
        nextMonth: document.getElementById("nextMonth"),
        todayButton: document.getElementById("todayButton"),
        overallText: document.getElementById("overallText"),
        overallRate: document.getElementById("overallRate"),
        overallBar: document.getElementById("overallBar"),
        subjectProgressList: document.getElementById("subjectProgressList"),
        recordForm: document.getElementById("recordForm"),
        recordDate: document.getElementById("recordDate"),
        recordSubject: document.getElementById("recordSubject"),
        recordCount: document.getElementById("recordCount"),
        recordNote: document.getElementById("recordNote"),
        saveRecordButton: document.getElementById("saveRecordButton"),
        cancelEditButton: document.getElementById("cancelEditButton"),
        goalList: document.getElementById("goalList"),
        goalForm: document.getElementById("goalForm"),
        newSubjectName: document.getElementById("newSubjectName"),
        newSubjectGoal: document.getElementById("newSubjectGoal"),
        calendarGrid: document.getElementById("calendarGrid"),
        selectedDateTitle: document.getElementById("selectedDateTitle"),
        selectedRecordList: document.getElementById("selectedRecordList"),
        exportButton: document.getElementById("exportButton"),
        importButton: document.getElementById("importButton"),
        importFile: document.getElementById("importFile"),
        resetButton: document.getElementById("resetButton"),
        goalModal: document.getElementById("goalModal"),
        goalEditForm: document.getElementById("goalEditForm"),
        editGoalSubjectId: document.getElementById("editGoalSubjectId"),
        editGoalName: document.getElementById("editGoalName"),
        editGoalCount: document.getElementById("editGoalCount"),
        closeGoalModal: document.getElementById("closeGoalModal"),
        todayDateText: document.getElementById("todayDateText"),
        todaySolvedText: document.getElementById("todaySolvedText"),
        monthGoalText: document.getElementById("monthGoalText"),
        todayMemoText: document.getElementById("todayMemoText"),
        recordCountStatus: document.getElementById("recordCountStatus"),
        ddayText: document.getElementById("ddayText")
      };

      function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function getMonthKey() {
        return formatMonthKey(viewDate);
      }

      function ensureMonthGoals(monthKey) {
        if (!data.monthlyGoals[monthKey]) {
          const previousMonth = new Date(
            viewDate.getFullYear(),
            viewDate.getMonth() - 1,
            1
          );
          const previousGoals =
            data.monthlyGoals[formatMonthKey(previousMonth)] || {};

          data.monthlyGoals[monthKey] = {};
          data.subjects.forEach((subject) => {
            data.monthlyGoals[monthKey][subject.id] =
              Number(previousGoals[subject.id]) || 0;
          });
          saveData();
        }
      }

      function subjectById(subjectId) {
        return data.subjects.find((subject) => subject.id === subjectId);
      }

      function recordsForMonth(monthKey) {
        return data.records.filter((record) => record.date.startsWith(monthKey));
      }

      function totalForSubject(monthKey, subjectId) {
        return recordsForMonth(monthKey)
          .filter((record) => record.subjectId === subjectId)
          .reduce((sum, record) => sum + Number(record.count), 0);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderHeaderSummary() {
        const todayKey = formatDateKey(today);
        const todayRecords = data.records.filter((record) => record.date === todayKey);
        const totalToday = todayRecords.reduce(
          (sum, record) => sum + Number(record.count),
          0
        );

        elements.todayDateText.textContent =
          `${today.getFullYear()}.${pad(today.getMonth() + 1)}.${pad(today.getDate())}`;

        if (todayRecords.length === 0) {
          elements.todaySolvedText.textContent = "아직 기록이 없어요.";
          elements.todayMemoText.textContent = "오늘의 공부를 기록해 봐요.";
        } else {
          const summary = todayRecords
            .map((record) => {
              const subject = subjectById(record.subjectId);
              return `${subject?.name || "삭제된 과목"} ${Number(record.count)}문제`;
            })
            .join(" · ");

          elements.todaySolvedText.innerHTML =
            `<strong>총 ${totalToday}문제</strong> · ${escapeHtml(summary)}`;

          const notes = todayRecords
            .map((record) => record.note?.trim())
            .filter(Boolean);

          elements.todayMemoText.textContent =
            notes.length > 0 ? notes.join(" / ") : "메모 없이 기록했어요.";
        }

        const monthKey = formatMonthKey(today);
        ensureMonthGoals(monthKey);

        const goalSummary = data.subjects
          .map((subject) => {
            const goal = Number(data.monthlyGoals[monthKey]?.[subject.id]) || 0;
            return `${subject.name} ${goal}문제`;
          })
          .join(" · ");

        elements.monthGoalText.textContent =
          goalSummary || "목표를 설정해 주세요.";

        const endOfMonth = new Date(
          today.getFullYear(),
          today.getMonth() + 1,
          0
        );
        const diff = Math.ceil((endOfMonth - today) / 86400000);
        elements.ddayText.textContent = `이번 달 종료 D-${diff}`;
      }

      function renderMonthHeader() {
        elements.monthLabel.textContent =
          `${viewDate.getFullYear()}년 ${viewDate.getMonth() + 1}월`;
      }

      function renderSubjectOptions() {
        const currentValue = elements.recordSubject.value;
        elements.recordSubject.innerHTML = "";

        data.subjects.forEach((subject) => {
          const option = document.createElement("option");
          option.value = subject.id;
          option.textContent = subject.name;
          elements.recordSubject.appendChild(option);
        });

        if (data.subjects.some((subject) => subject.id === currentValue)) {
          elements.recordSubject.value = currentValue;
        }
      }

      function renderGoals() {
        const monthKey = getMonthKey();
        ensureMonthGoals(monthKey);
        const goals = data.monthlyGoals[monthKey];

        if (data.subjects.length === 0) {
          elements.goalList.innerHTML =
            '<div class="empty">먼저 과목을 추가해 주세요.</div>';
          return;
        }

        elements.goalList.innerHTML = data.subjects
          .map((subject) => {
            const goal = Number(goals[subject.id]) || 0;
            return `
              <div class="goal-row">
                <div class="goal-name">□ ${escapeHtml(subject.name)}</div>
                <div class="goal-count">${goal.toLocaleString()}문제</div>
                <button
                  type="button"
                  class="btn small edit-goal"
                  data-subject-id="${subject.id}"
                >수정</button>
              </div>
            `;
          })
          .join("");

        elements.goalList
          .querySelectorAll(".edit-goal")
          .forEach((button) => {
            button.addEventListener("click", () =>
              openGoalModal(button.dataset.subjectId)
            );
          });
      }

      function renderProgress() {
        const monthKey = getMonthKey();
        ensureMonthGoals(monthKey);
        const goals = data.monthlyGoals[monthKey];

        let totalGoal = 0;
        let totalDone = 0;

        const items = data.subjects.map((subject) => {
          const goal = Number(goals[subject.id]) || 0;
          const done = totalForSubject(monthKey, subject.id);
          const rate = goal > 0 ? (done / goal) * 100 : 0;
          const visualRate = Math.min(rate, 100);

          totalGoal += goal;
          totalDone += done;

          return `
            <div class="progress-card">
              <div class="progress-top">
                <span class="progress-name">${escapeHtml(subject.name)}</span>
                <span class="progress-number">
                  ${done.toLocaleString()} / ${goal.toLocaleString()}문제
                  · ${rate.toFixed(1)}%
                </span>
              </div>
              <div class="progress-track">
                <div class="progress-bar" style="width:${visualRate}%"></div>
              </div>
            </div>
          `;
        });

        const overallRate = totalGoal > 0 ? (totalDone / totalGoal) * 100 : 0;

        elements.overallText.textContent =
          `${totalDone.toLocaleString()} / ${totalGoal.toLocaleString()}문제`;
        elements.overallRate.textContent = `${overallRate.toFixed(1)}%`;
        elements.overallBar.style.width = `${Math.min(overallRate, 100)}%`;
        elements.subjectProgressList.innerHTML =
          items.join("") ||
          '<div class="empty">등록된 과목이 없습니다.</div>';
      }

      function renderCalendar() {
        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        const firstDay = new Date(year, month, 1);
        const start = new Date(year, month, 1 - firstDay.getDay());

        elements.calendarGrid.innerHTML = "";

        for (let index = 0; index < 42; index += 1) {
          const date = new Date(start);
          date.setDate(start.getDate() + index);

          const dateKey = formatDateKey(date);
          const isCurrentMonth = date.getMonth() === month;
          const isToday = dateKey === formatDateKey(today);
          const isSelected = dateKey === selectedDateKey;
          const dayRecords = data.records.filter(
            (record) => record.date === dateKey
          );
          const total = dayRecords.reduce(
            (sum, record) => sum + Number(record.count),
            0
          );

          const button = document.createElement("button");
          button.type = "button";
          button.className = [
            "day",
            isCurrentMonth ? "" : "other",
            isToday ? "today" : "",
            isSelected ? "selected" : ""
          ]
            .filter(Boolean)
            .join(" ");

          const recordLines = dayRecords
            .slice(0, 3)
            .map((record) => {
              const subject = subjectById(record.subjectId);
              return `<span class="day-record">${escapeHtml(
                subject?.name || "삭제된 과목"
              )} ${Number(record.count)}개</span>`;
            })
            .join("");

          button.innerHTML = `
            <span class="day-number">${date.getDate()}</span>
            ${
              total > 0
                ? `<div class="day-total">총 ${total}문제</div>`
                : ""
            }
            ${recordLines}
          `;

          button.addEventListener("click", () => {
            selectedDateKey = dateKey;
            elements.recordDate.value = dateKey;

            if (!isCurrentMonth) {
              viewDate = new Date(
                date.getFullYear(),
                date.getMonth(),
                1
              );
              renderAll();
            } else {
              renderCalendar();
              renderSelectedRecords();
            }
          });

          elements.calendarGrid.appendChild(button);
        }
      }

      function renderSelectedRecords() {
        const selectedDate = parseDateKey(selectedDateKey);

        elements.selectedDateTitle.textContent =
          `${selectedDate.getFullYear()}.${pad(
            selectedDate.getMonth() + 1
          )}.${pad(selectedDate.getDate())}`;

        const records = data.records
          .filter((record) => record.date === selectedDateKey)
          .sort((a, b) => a.createdAt - b.createdAt);

        if (records.length === 0) {
          elements.selectedRecordList.innerHTML =
            '<div class="empty">이 날짜에는 아직 기록이 없어요.</div>';
          return;
        }

        elements.selectedRecordList.innerHTML = records
          .map((record) => {
            const subject = subjectById(record.subjectId);
            return `
              <div class="record-item">
                <div class="record-item-head">
                  <span class="record-subject">□ ${escapeHtml(
                    subject?.name || "삭제된 과목"
                  )}</span>
                  <span class="record-count">${Number(
                    record.count
                  ).toLocaleString()}문제</span>
                </div>

                ${
                  record.note
                    ? `<p class="record-note">${escapeHtml(record.note)}</p>`
                    : ""
                }

                <div class="record-buttons">
                  <button
                    type="button"
                    class="btn small edit-record"
                    data-record-id="${record.id}"
                  >수정</button>
                  <button
                    type="button"
                    class="btn danger small delete-record"
                    data-record-id="${record.id}"
                  >삭제</button>
                </div>
              </div>
            `;
          })
          .join("");

        elements.selectedRecordList
          .querySelectorAll(".edit-record")
          .forEach((button) => {
            button.addEventListener("click", () =>
              editRecord(button.dataset.recordId)
            );
          });

        elements.selectedRecordList
          .querySelectorAll(".delete-record")
          .forEach((button) => {
            button.addEventListener("click", () =>
              deleteRecord(button.dataset.recordId)
            );
          });
      }

      function renderStatus() {
        elements.recordCountStatus.textContent =
          `${data.records.length.toLocaleString()}개의 기록`;
      }

      function renderAll() {
        ensureMonthGoals(getMonthKey());
        renderHeaderSummary();
        renderMonthHeader();
        renderSubjectOptions();
        renderGoals();
        renderProgress();
        renderCalendar();
        renderSelectedRecords();
        renderStatus();
      }

      function resetRecordForm() {
        editingRecordId = null;
        elements.recordForm.reset();
        elements.recordDate.value = selectedDateKey;
        elements.saveRecordButton.textContent = "기록 저장";
        elements.cancelEditButton.hidden = true;
        renderSubjectOptions();
      }

      function editRecord(recordId) {
        const record = data.records.find((item) => item.id === recordId);
        if (!record) return;

        editingRecordId = recordId;
        elements.recordDate.value = record.date;
        elements.recordSubject.value = record.subjectId;
        elements.recordCount.value = record.count;
        elements.recordNote.value = record.note || "";
        elements.saveRecordButton.textContent = "수정 저장";
        elements.cancelEditButton.hidden = false;
        elements.recordDate.scrollIntoView({
          behavior: "smooth",
          block: "center"
        });
      }

      function deleteRecord(recordId) {
        const record = data.records.find((item) => item.id === recordId);
        if (!record) return;

        if (!confirm("이 학습 기록을 삭제할까요?")) return;

        data.records = data.records.filter((item) => item.id !== recordId);
        saveData();

        if (editingRecordId === recordId) {
          resetRecordForm();
        }

        renderAll();
      }

      function openGoalModal(subjectId) {
        const subject = subjectById(subjectId);
        if (!subject) return;

        const monthKey = getMonthKey();
        ensureMonthGoals(monthKey);

        elements.editGoalSubjectId.value = subjectId;
        elements.editGoalName.value = subject.name;
        elements.editGoalCount.value =
          Number(data.monthlyGoals[monthKey][subjectId]) || 0;
        elements.goalModal.classList.add("show");
        elements.editGoalName.focus();
      }

      function closeGoalModal() {
        elements.goalModal.classList.remove("show");
      }

      elements.recordForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const date = elements.recordDate.value;
        const subjectId = elements.recordSubject.value;
        const count = Number(elements.recordCount.value);
        const note = elements.recordNote.value.trim();

        if (!date || !subjectId || !Number.isInteger(count) || count <= 0) {
          alert("날짜, 과목, 문제 수를 올바르게 입력해 주세요.");
          return;
        }

        if (editingRecordId) {
          const record = data.records.find(
            (item) => item.id === editingRecordId
          );
          if (!record) return;

          record.date = date;
          record.subjectId = subjectId;
          record.count = count;
          record.note = note;
        } else {
          data.records.push({
            id: makeId(),
            date,
            subjectId,
            count,
            note,
            createdAt: Date.now()
          });
        }

        saveData();
        selectedDateKey = date;

        const savedDate = parseDateKey(date);
        viewDate = new Date(
          savedDate.getFullYear(),
          savedDate.getMonth(),
          1
        );

        resetRecordForm();
        renderAll();
      });

      elements.cancelEditButton.addEventListener(
        "click",
        resetRecordForm
      );

      elements.goalForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const name = elements.newSubjectName.value.trim();
        const goal = Number(elements.newSubjectGoal.value);

        if (!name || !Number.isInteger(goal) || goal <= 0) {
          alert("과목 이름과 목표 문제 수를 올바르게 입력해 주세요.");
          return;
        }

        const duplicate = data.subjects.some(
          (subject) =>
            subject.name.toLowerCase() === name.toLowerCase()
        );

        if (duplicate) {
          alert("이미 같은 이름의 과목이 있습니다.");
          return;
        }

        const subject = {
          id: makeId(),
          name
        };

        data.subjects.push(subject);
        ensureMonthGoals(getMonthKey());
        data.monthlyGoals[getMonthKey()][subject.id] = goal;

        saveData();
        elements.goalForm.reset();
        renderAll();
      });

      elements.goalEditForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const subjectId = elements.editGoalSubjectId.value;
        const name = elements.editGoalName.value.trim();
        const goal = Number(elements.editGoalCount.value);

        if (!name || !Number.isInteger(goal) || goal <= 0) {
          alert("과목 이름과 목표 문제 수를 올바르게 입력해 주세요.");
          return;
        }

        const subject = subjectById(subjectId);
        if (!subject) return;

        const duplicate = data.subjects.some(
          (item) =>
            item.id !== subjectId &&
            item.name.toLowerCase() === name.toLowerCase()
        );

        if (duplicate) {
          alert("이미 같은 이름의 과목이 있습니다.");
          return;
        }

        subject.name = name;
        data.monthlyGoals[getMonthKey()][subjectId] = goal;

        saveData();
        closeGoalModal();
        renderAll();
      });

      elements.closeGoalModal.addEventListener(
        "click",
        closeGoalModal
      );

      elements.goalModal.addEventListener("click", (event) => {
        if (event.target === elements.goalModal) {
          closeGoalModal();
        }
      });

      elements.prevMonth.addEventListener("click", () => {
        viewDate = new Date(
          viewDate.getFullYear(),
          viewDate.getMonth() - 1,
          1
        );
        selectedDateKey = formatDateKey(viewDate);
        resetRecordForm();
        renderAll();
      });

      elements.nextMonth.addEventListener("click", () => {
        viewDate = new Date(
          viewDate.getFullYear(),
          viewDate.getMonth() + 1,
          1
        );
        selectedDateKey = formatDateKey(viewDate);
        resetRecordForm();
        renderAll();
      });

      elements.todayButton.addEventListener("click", () => {
        viewDate = new Date(
          today.getFullYear(),
          today.getMonth(),
          1
        );
        selectedDateKey = formatDateKey(today);
        resetRecordForm();
        renderAll();
      });

      elements.exportButton.addEventListener("click", () => {
        const blob = new Blob(
          [JSON.stringify(data, null, 2)],
          { type: "application/json" }
        );

        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");

        anchor.href = url;
        anchor.download =
          `study-diary-backup-${formatDateKey(today)}.json`;

        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(url);
      });

      elements.importButton.addEventListener("click", () => {
        elements.importFile.click();
      });

      elements.importFile.addEventListener("change", async () => {
        const file = elements.importFile.files?.[0];
        if (!file) return;

        try {
          const text = await file.text();
          const imported = JSON.parse(text);

          if (
            !imported ||
            !Array.isArray(imported.subjects) ||
            !imported.monthlyGoals ||
            !Array.isArray(imported.records)
          ) {
            throw new Error("올바른 백업 파일이 아닙니다.");
          }

          if (!confirm("현재 데이터를 백업 파일의 내용으로 바꿀까요?")) {
            return;
          }

          data = imported;
          saveData();
          resetRecordForm();
          renderAll();
          alert("백업을 불러왔습니다.");
        } catch (error) {
          console.error(error);
          alert("백업 파일을 읽지 못했습니다.");
        } finally {
          elements.importFile.value = "";
        }
      });

      elements.resetButton.addEventListener("click", () => {
        if (!confirm("과목, 목표, 학습 기록을 모두 삭제할까요?")) {
          return;
        }

        if (!confirm("정말 삭제할까요? 이 작업은 되돌릴 수 없습니다.")) {
          return;
        }

        data = cloneDefaultData();
        saveData();

        viewDate = new Date(
          today.getFullYear(),
          today.getMonth(),
          1
        );
        selectedDateKey = formatDateKey(today);

        resetRecordForm();
        renderAll();
      });

      elements.recordDate.value = selectedDateKey;
      renderAll();
    })();
  </script>
</body>
</html>
